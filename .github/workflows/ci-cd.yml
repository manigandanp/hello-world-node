name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─── Lint & Test ─────────────────────────────────────
  lint-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint

      - name: Run tests
        run: npm test

  # ─── Build Docker Image ──────────────────────────────
  build:
    name: Build Docker Image
    needs: lint-test
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=ref,event=pr

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Deploy to DEV (on Pull Request) ────────────────
  deploy-dev:
    name: Deploy to Development
    needs: build
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: development
    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          ping: oracle-2.tailf7c768.ts.net

      - name: Deploy via Tailscale SSH
        env:
          SHA: ${{ github.sha }}
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
        run: |
          SHORT_SHA=$(echo "$SHA" | cut -c1-7)
          IMAGE="${REGISTRY}/${IMAGE_NAME}:${SHORT_SHA}"
          
          ssh -o StrictHostKeyChecking=no ubuntu@oracle-2.tailf7c768.ts.net << DEPLOY
            set -e
            echo "Pulling ${IMAGE}..."
            for i in 1 2 3 4 5; do
              docker pull "${IMAGE}" && break
              echo "Retry $i: image not yet available, waiting 15s..."
              sleep 15
            done
            echo "Stopping old container..."
            docker stop hello-world-dev 2>/dev/null || true
            docker rm hello-world-dev 2>/dev/null || true
            echo "Starting new container..."
            docker run -d \
              --name hello-world-dev \
              --restart unless-stopped \
              -p 3000:3000 \
              -e NODE_ENV=development \
              "${IMAGE}"
            echo "Cleaning up old images..."
            docker image prune -f --filter "until=24h" 2>/dev/null || true
            echo "DEV deployed successfully!"
          DEPLOY

  # ─── Cleanup Old GHCR Images ──────────────────────────
  cleanup-ghcr:
    name: Cleanup Old GHCR Images
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Delete untagged images
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get all package versions
          VERSIONS=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/users/${{ github.repository_owner }}/packages/container/${{ github.event.repository.name }}/versions?per_page=100")
          
          # Delete untagged versions (stale builds), keep tagged ones
          echo "$VERSIONS" | python3 -c "
          import sys, json
          versions = json.load(sys.stdin)
          for v in versions:
              tags = v.get('metadata', {}).get('container', {}).get('tags', [])
              if not tags:
                  print(f'DELETE:{v[\"id\"]}')
          " | while IFS= read -r line; do
              if [[ "$line" == DELETE:* ]]; then
                  VID="${line#DELETE:}"
                  echo "Deleting untagged version $VID..."
                  curl -s -X DELETE -H "Authorization: token $GH_TOKEN" \
                    "https://api.github.com/users/${{ github.repository_owner }}/packages/container/${{ github.event.repository.name }}/versions/${VID}" || true
              fi
          done
          echo "GHCR cleanup complete"

  # ─── Deploy to PRD (on Main Merge) ──────────────────
  deploy-prd:
    name: Deploy to Production
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          ping: oracle-1.tailf7c768.ts.net

      - name: Deploy via Tailscale SSH
        env:
          SHA: ${{ github.sha }}
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
        run: |
          SHORT_SHA=$(echo "$SHA" | cut -c1-7)
          IMAGE="${REGISTRY}/${IMAGE_NAME}:${SHORT_SHA}"
          
          ssh -o StrictHostKeyChecking=no ubuntu@oracle-1.tailf7c768.ts.net << DEPLOY
            set -e
            echo "Pulling ${IMAGE}..."
            for i in 1 2 3 4 5; do
              docker pull "${IMAGE}" && break
              echo "Retry $i: image not yet available, waiting 15s..."
              sleep 15
            done
            echo "Stopping old container..."
            docker stop hello-world-prd 2>/dev/null || true
            docker rm hello-world-prd 2>/dev/null || true
            echo "Starting new container..."
            docker run -d \
              --name hello-world-prd \
              --restart unless-stopped \
              -p 3000:3000 \
              -e NODE_ENV=production \
              "${IMAGE}"
            echo "Waiting for health check..."
            sleep 5
            curl -sf http://localhost:3000/health || (echo "Health check failed!" && exit 1)
            echo "Cleaning up old images..."
            docker image prune -f --filter "until=24h" 2>/dev/null || true
            echo "PROD deployed and healthy!"
          DEPLOY